<!DOCTYPE html> 
<html lang="pt-BR"> 
    <head> 
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <link rel="stylesheet" href="style.css"> 
        <title>TaskLobbyV1</title> 
    </head>
    <body> 
        <header class="header">
            <div class="header__logo">
            </div>
            <div class="header__title">
                <h1>Todas As Tarefas</h1> 
                <p id="header__title__contador">Pendentes: 0 · Concluídos: 0</p> 
            </div>
            <div class="header__actions">
                <input id="search-task" type="text" placeholder="Pesquisar Tarefas..." >
                <button id="add-task">+ Add Tarefa</button>
            </div>
        </header> 
        <div class="modal__add-task"> 
            <div class="modal__add-task__conteudo">
            <input id="modal__add-task__nova" type="text" placeholder="Qual a nova tarefa?">
                <div class="botoes">
                    <button class="botao-cancelar">Cancelar</button>
                    <button class="botao-confirmar">Confirmar</button>
                </div>
            </div>
        </div>
        <main> 
            <aside class="sidebar">
                <section class="sidebar__navigation"> 
                    <h2>Navegação</h2>
                        <ul>
                            <li>Todas As Tarefas</li>
                            <li>Hoje</li>
                            <li>Importantes</li>
                            <li>Entrada</li>
                            <li>Concluídos</li>
                        </ul>
                </section>
                <section class="sidebar__projects"> 
                    <h2>Projetos</h2>
                        <ul>
                        </ul>
                </section>
            </aside>
            <section class="tasks"> 
                <section class="tasks__pendentes">
                    <ul id="tasks__pendentes__lista">
                    </ul>
                </section>
                <section class="tasks__concluidos">
                    <h2>Concluídos (1)</h2>
                    <ul id="tasks__concluidos__lista"> 
                    </ul>
                </section> 
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
